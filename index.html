<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>workpts — terminal</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0a0e0a;--bg2:#0d120d;--green:#39ff6a;--green-dim:#1a7a30;
  --green-faint:rgba(57,255,106,0.07);--amber:#e8b84b;--red:#ff4f4f;
  --cyan:#4fffd4;--muted:#3a6640;--text:#b8f0c0;--border:#1e3a22;--border2:#2a5030;
  --font:'JetBrains Mono',monospace;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;line-height:1.6;overflow:hidden;}

/* CRT */
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.12) 2px,rgba(0,0,0,0.12) 4px);}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9998;background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,0.5) 100%);}

/* TITLEBAR */
.titlebar{
  height:38px;background:#0d120d;border-bottom:1px solid var(--border2);
  display:flex;align-items:center;padding:0 1rem;flex-shrink:0;user-select:none;
}
.dots{display:flex;gap:6px;margin-right:12px;}
.dot{width:12px;height:12px;border-radius:50%;}
.dot-r{background:#ff5f57;}.dot-y{background:#febc2e;}.dot-g{background:#28c840;}
.title-text{font-size:12px;color:var(--muted);flex:1;text-align:center;letter-spacing:.05em;}
.title-text span{color:var(--green);}
.title-user{font-size:11px;color:var(--muted);}

/* LAYOUT */
.shell{display:flex;flex-direction:column;height:calc(100vh - 38px);}
.output-area{
  flex:1;overflow-y:auto;padding:1rem 1.25rem 0.5rem;
  display:flex;flex-direction:column;gap:0;
}
.prompt-bar{
  flex-shrink:0;border-top:1px solid var(--border2);background:#0d120d;
  padding:8px 1.25rem;display:flex;align-items:center;gap:0;
}

/* OUTPUT LINES */
.line{display:block;white-space:pre-wrap;word-break:break-word;padding:1px 0;}
.line-dim{color:var(--muted);}
.line-err{color:var(--red);}
.line-ok{color:var(--green);}
.line-amber{color:var(--amber);}
.line-cyan{color:var(--cyan);}
.line-cmd{color:var(--text);}
.line-blank{height:6px;display:block;}

/* PROMPT */
.ps1{white-space:nowrap;flex-shrink:0;margin-right:6px;}
.ps1-u{color:var(--green);font-weight:700;}
.ps1-h{color:var(--cyan);}
.ps1-p{color:var(--amber);}
.ps1-s{color:var(--green);}
#cmdInput{
  flex:1;background:transparent;border:none;outline:none;
  color:var(--green);font-family:var(--font);font-size:13px;
  caret-color:var(--green);padding:0;
  /* kill autocomplete styling */
  -webkit-text-fill-color:var(--green);
}
#cmdInput::-webkit-contacts-auto-fill-button,
#cmdInput::-webkit-credentials-auto-fill-button{display:none!important;}

/* TABLES */
.t-table{width:100%;border-collapse:collapse;margin:4px 0;}
.t-table th{color:var(--muted);text-align:left;font-size:11px;padding:2px 10px 6px;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.08em;font-weight:500;}
.t-table td{padding:5px 10px;border-bottom:1px solid var(--border);vertical-align:middle;}
.t-table tr:last-child td{border-bottom:none;}
.t-table tr:hover td{background:var(--green-faint);}
.t-table tr.me td{background:rgba(57,255,106,0.04);}
.rb{display:inline-block;font-size:11px;font-weight:700;padding:1px 6px;border:1px solid var(--border2);color:var(--muted);min-width:32px;text-align:center;}
.rb.r1{color:var(--amber);border-color:rgba(232,184,75,0.4);}
.rb.r2{color:#c0c0c0;border-color:rgba(192,192,192,0.3);}
.rb.r3{color:#cd7f32;border-color:rgba(205,127,50,0.3);}
.prog-f{color:var(--green);}
.prog-e{color:var(--muted);}

/* TASK CHECKLIST */
.checklist{margin:4px 0;}
.check-row{
  display:flex;align-items:center;gap:10px;padding:5px 0;
  border-bottom:1px solid var(--border);cursor:pointer;
}
.check-row:last-child{border-bottom:none;}
.check-row:hover .cb{border-color:var(--green);}
.cb{
  width:16px;height:16px;border:1px solid var(--border2);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  font-size:10px;color:var(--green);transition:all .1s;
}
.cb.checked{background:var(--green-faint);border-color:var(--green-dim);}
.check-name{flex:1;font-size:13px;}
.check-name.done{color:var(--muted);text-decoration:line-through;}
.check-pts{font-size:12px;color:var(--green);font-weight:700;white-space:nowrap;}
.check-diff{font-size:11px;padding:0 5px;border:1px solid;}
.d-easy{color:var(--green);border-color:var(--green-dim);}
.d-medium{color:var(--amber);border-color:rgba(232,184,75,.4);}
.d-hard{color:#ff8c42;border-color:rgba(255,140,66,.4);}
.d-expert{color:#ff6ecb;border-color:rgba(255,110,203,.4);}

/* PODIUM */
.podium{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--border);margin:6px 0 10px;}
.pc{background:var(--bg2);padding:10px 12px;text-align:center;}
.pc.p1{background:rgba(232,184,75,.05);}
.pc-sym{font-size:12px;margin-bottom:3px;}
.pc-name{font-weight:700;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pc-pts{font-size:16px;font-weight:700;}
.p1 .pc-pts{color:var(--amber);}
.p2 .pc-pts{color:#c0c0c0;}
.p3 .pc-pts{color:#cd7f32;}
.pc-tasks{font-size:11px;color:var(--muted);}

/* SPINNER */
.spin{display:inline-block;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border2);}
::-webkit-scrollbar-thumb:hover{background:var(--green-dim);}

@media(max-width:600px){
  .podium{grid-template-columns:1fr;}
  .output-area{padding:.75rem .75rem .5rem;}
  .prompt-bar{padding:8px .75rem;}
}
</style>
</head>
<body>

<div class="titlebar">
  <div class="dots"><div class="dot dot-r"></div><div class="dot dot-y"></div><div class="dot dot-g"></div></div>
  <div class="title-text">workpts@<span>terminal</span> — bash</div>
  <div class="title-user" id="titleUser"></div>
</div>

<div class="shell">
  <div class="output-area" id="out"></div>
  <div class="prompt-bar">
    <span class="ps1" id="ps1">
      <span class="ps1-u" id="ps1u">guest</span><span class="ps1-h">@workpts</span><span style="color:var(--muted)">:</span><span class="ps1-p" id="ps1p">~</span><span class="ps1-s">$ </span>
    </span>
    <input id="cmdInput" type="password" autocomplete="new-password" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="" />
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyDtjWUKd4ieA_sorxiboe8B0CCKZk5CR78",
  authDomain:"productivity-game-2541e.firebaseapp.com",
  projectId:"productivity-game-2541e",
  storageBucket:"productivity-game-2541e.firebasestorage.app",
  messagingSenderId:"366980877812",
  appId:"1:366980877812:web:34d0df0519b94e50d43da1"
});
const db = firebase.firestore();
const usersCol = db.collection('users');

// ── State ─────────────────────────────────────────────────────────────────
let session = { user: null, mode: 'cmd' }; // mode: cmd | password
let passwordCallback = null;
let cmdHistory = [], histIdx = -1, draftCmd = '';
let allData = {};
let liveUnsub = null;

const DIFF_LABELS={'1':'easy','1.5':'medium','2.5':'hard','4':'expert'};
const DIFF_CLS={'1':'d-easy','1.5':'d-medium','2.5':'d-hard','4':'d-expert'};
const DIFF_VALS={'easy':1,'medium':1.5,'hard':2.5,'expert':4,'e':1,'m':1.5,'h':2.5,'x':4};

// ── Scoring ───────────────────────────────────────────────────────────────
function calcPoints(tasks){
  let total=0,hist=[];
  for(const t of (tasks||[])){
    if(!t.done)continue;
    const base=t.units*parseFloat(t.diff)*10;
    const avg=hist.length?hist.reduce((a,b)=>a+b,0)/hist.length:null;
    const bonus=(avg!==null&&base>avg)?Math.round((base-avg)*.3):0;
    hist.push(base);total+=Math.round(base+bonus);
  }
  return total;
}
function taskPts(t,doneOnly,all){
  const doneTasks=(all||[]).filter(x=>x.done);
  const idx=doneTasks.indexOf(t);
  if(idx<0){
    // preview pts if checked
    const base=t.units*parseFloat(t.diff)*10;
    const hist=doneTasks.map(x=>x.units*parseFloat(x.diff)*10);
    const avg=hist.length?hist.reduce((a,b)=>a+b,0)/hist.length:null;
    const bonus=(avg!==null&&base>avg)?Math.round((base-avg)*.3):0;
    return Math.round(base+bonus);
  }
  const prior=doneTasks.slice(0,idx);
  const base=t.units*parseFloat(t.diff)*10;
  const avg=prior.length?prior.map(x=>x.units*parseFloat(x.diff)*10).reduce((a,b)=>a+b,0)/prior.length:null;
  const bonus=(avg!==null&&base>avg)?Math.round((base-avg)*.3):0;
  return Math.round(base+bonus);
}

function progBar(pct,len=16){
  const f=Math.round((pct/100)*len);
  return `<span class="prog-f">${'█'.repeat(f)}</span><span class="prog-e">${'░'.repeat(len-f)}</span> ${pct}%`;
}

// ── Hashing ───────────────────────────────────────────────────────────────
async function sha256(str){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

// ── Live listener ─────────────────────────────────────────────────────────
function startLive(){
  if(liveUnsub)liveUnsub();
  liveUnsub=usersCol.onSnapshot(snap=>{
    snap.forEach(doc=>{allData[doc.id]=doc.data();});
    // if leaderboard is currently shown, refresh it silently
    const lbEl=document.getElementById('live-lb');
    if(lbEl)lbEl.innerHTML=buildLbTable();
  });
}

// ── Output helpers ────────────────────────────────────────────────────────
const out=document.getElementById('out');
function print(text='',cls=''){
  const el=document.createElement('span');
  el.className='line'+(cls?' '+cls:'');
  el.innerHTML=text;
  out.appendChild(el);
  out.scrollTop=out.scrollHeight;
  return el;
}
function blank(){const el=document.createElement('span');el.className='line-blank';out.appendChild(el);}
function printCmd(cmd){
  // echo the command (show *** for password mode)
  const display=session.mode==='password'?'*'.repeat(cmd.length):cmd;
  const ps=document.getElementById('ps1').innerHTML;
  print(`${document.getElementById('ps1u').textContent}@workpts:${document.getElementById('ps1p').textContent}$ ${display}`,'line-dim');
}
function appendEl(el){out.appendChild(el);out.scrollTop=out.scrollHeight;}
function clearOut(){out.innerHTML='';}

function setPrompt(user,path){
  document.getElementById('ps1u').textContent=user||'guest';
  document.getElementById('ps1p').textContent=path||'~';
  document.getElementById('titleUser').textContent=user?`[${user}]`:'';
}

// ── Password mode ─────────────────────────────────────────────────────────
function askPassword(prompt,cb){
  session.mode='password';
  passwordCallback=cb;
  print(prompt,'line-dim');
  document.getElementById('cmdInput').type='password';
  document.getElementById('cmdInput').value='';
}
function exitPasswordMode(){
  session.mode='cmd';
  passwordCallback=null;
  document.getElementById('cmdInput').type='text';
  document.getElementById('cmdInput').value='';
}

// ── Commands ──────────────────────────────────────────────────────────────
const COMMANDS={

  help(){
    blank();
    print('available commands:','line-dim');
    blank();
    const cmds=[
      ['register &lt;name&gt;','create a new account'],
      ['login &lt;name&gt;',    'login to your account'],
      ['logout',            'end your session'],
      ['leaderboard',       'show live rankings (alias: lb)'],
      ['tasks',             'view and manage your task list'],
      ['add &lt;name&gt; [units] [difficulty]','add a task  (diff: easy/medium/hard/expert)'],
      ['check &lt;#&gt;',       'check off a task by number'],
      ['uncheck &lt;#&gt;',     'uncheck a task'],
      ['rm &lt;#&gt;',          'remove a task'],
      ['clear',             'clear the terminal'],
      ['help',              'show this message'],
    ];
    cmds.forEach(([cmd,desc])=>{
      print(`  <span style="color:var(--green)">${cmd.padEnd(38)}</span><span class="line-dim">${desc}</span>`);
    });
    blank();
  },

  async register(args){
    const name=(args[0]||'').trim();
    if(!name){print('usage: register &lt;username&gt;','line-err');return;}
    if(allData[name]){print(`error: user "${name}" already exists — use: login ${name}`,'line-err');return;}
    blank();
    print(`registering new user: <span style="color:var(--green)">${name}</span>`,'line-dim');
    askPassword('enter a password: ',async(pw1)=>{
      if(!pw1){print('error: password cannot be empty','line-err');exitPasswordMode();return;}
      askPassword('confirm password:  ',async(pw2)=>{
        if(pw1!==pw2){print('error: passwords do not match','line-err');exitPasswordMode();return;}
        const hash=await sha256(pw1);
        allData[name]={tasks:[],passwordHash:hash};
        await usersCol.doc(name).set({tasks:[],passwordHash:hash});
        session.user=name;
        setPrompt(name,'~/tasks');
        exitPasswordMode();
        blank();
        print(`[OK] registered and logged in as <span style="color:var(--green)">${name}</span>`,'line-ok');
        print('type "tasks" to manage your task list, "help" for all commands','line-dim');
        blank();
      });
    });
  },

  async login(args){
    const name=(args[0]||'').trim();
    if(!name){print('usage: login &lt;username&gt;','line-err');return;}
    if(!allData[name]){print(`error: user "${name}" not found — use: register ${name}`,'line-err');return;}
    blank();
    askPassword(`password for ${name}: `,async(pw)=>{
      const hash=await sha256(pw);
      if(hash!==allData[name].passwordHash){
        print('error: incorrect password','line-err');
        exitPasswordMode();blank();return;
      }
      session.user=name;
      setPrompt(name,'~/tasks');
      exitPasswordMode();
      blank();
      print(`[OK] logged in as <span style="color:var(--green)">${name}</span>`,'line-ok');
      print('type "tasks" to manage your task list, "help" for all commands','line-dim');
      blank();
    });
  },

  logout(){
    if(!session.user){print('not logged in','line-err');return;}
    const u=session.user;
    session.user=null;
    setPrompt('guest','~');
    blank();
    print(`[OK] logged out ${u}`,'line-ok');
    blank();
  },

  leaderboard(){
    blank();
    print('<span class="line-dim"># ── live leaderboard ─────────────────────────────</span>');
    const entries=Object.entries(allData)
      .filter(([,d])=>d.passwordHash)
      .map(([n,d])=>({name:n,points:calcPoints(d.tasks),tasks:(d.tasks||[]).length,done:(d.tasks||[]).filter(t=>t.done).length}))
      .sort((a,b)=>b.points-a.points);
    if(!entries.length){print('no participants yet','line-dim');blank();return;}
    const maxPts=entries[0].points||1;
    const top3=[entries[0],entries[1],entries[2]];
    const order=[1,0,2],syms=['  2nd','★ 1st','  3rd'],pCls=['p2','p1','p3'],pColors=['#c0c0c0','var(--amber)','#cd7f32'];
    const pod=document.createElement('div');
    pod.className='podium';
    order.forEach((ri,ci)=>{
      const e=top3[ri];const cell=document.createElement('div');cell.className='pc '+pCls[ci];
      if(e){
        const isMe=e.name===session.user;
        cell.innerHTML=`<div class="pc-sym" style="color:${pColors[ci]}">${syms[ci]}</div>
          <div class="pc-name">${e.name}${isMe?' ◆':''}</div>
          <div class="pc-pts">${e.points.toLocaleString()}</div>
          <div class="pc-tasks">${e.done}/${e.tasks} done</div>`;
      }
      pod.appendChild(cell);
    });
    appendEl(pod);
    const wrap=document.createElement('div');wrap.id='live-lb';
    wrap.innerHTML=buildLbTable(entries,maxPts);
    appendEl(wrap);
    blank();
  },

  tasks(){
    if(!session.user){print('not logged in — use: login &lt;name&gt;','line-err');return;}
    const tasks=allData[session.user]?.tasks||[];
    blank();
    print(`<span class="line-dim"># ── task list for <span style="color:var(--green)">${session.user}</span> ─────────────────</span>`);
    print(`<span class="line-dim"># total: ${calcPoints(tasks)} pts | ${tasks.filter(t=>t.done).length}/${tasks.length} completed</span>`);
    print('<span class="line-dim"># use "check &lt;#&gt;" to complete a task, "add &lt;name&gt;" to add one</span>');
    blank();
    if(!tasks.length){print('no tasks yet — add one with: add &lt;task name&gt; [units] [difficulty]','line-dim');blank();return;}
    const cl=document.createElement('div');cl.className='checklist';
    tasks.forEach((t,i)=>{
      const pts=taskPts(t,t.done,tasks);
      const dc=DIFF_CLS[String(t.diff)]||'d-easy';
      const dl=DIFF_LABELS[String(t.diff)]||'easy';
      const row=document.createElement('div');row.className='check-row';
      row.innerHTML=`
        <div class="cb${t.done?' checked':''}">${t.done?'✓':''}</div>
        <span class="line-dim" style="font-size:11px;flex-shrink:0">[${String(i+1).padStart(2,'0')}]</span>
        <span class="check-name${t.done?' done':''}">${t.name}</span>
        <span class="check-diff ${dc}">${dl}</span>
        <span class="line-dim" style="font-size:11px">×${t.units}</span>
        <span class="check-pts">${t.done?pts:'+'+pts} pts</span>`;
      row.onclick=()=>runCmd(t.done?`uncheck ${i+1}`:`check ${i+1}`);
      cl.appendChild(row);
    });
    appendEl(cl);
    blank();
  },

  async add(args){
    if(!session.user){print('not logged in','line-err');return;}
    if(!args.length){print('usage: add &lt;task name&gt; [units] [difficulty]','line-err');return;}
    // parse trailing number and difficulty
    let name=args.join(' ');
    let units=1,diff='1';
    // check last arg for difficulty
    const lastArg=args[args.length-1].toLowerCase();
    if(DIFF_VALS[lastArg]!==undefined){diff=String(DIFF_VALS[lastArg]);args.pop();name=args.join(' ');}
    // check new last arg for units
    const maybeUnits=parseInt(args[args.length-1]);
    if(!isNaN(maybeUnits)&&maybeUnits>0){units=maybeUnits;args.pop();name=args.join(' ');}
    name=name.trim();
    if(!name){print('error: task name is required','line-err');return;}
    allData[session.user].tasks.push({name,units,diff,done:false,ts:Date.now()});
    await usersCol.doc(session.user).set({tasks:allData[session.user].tasks},{merge:true});
    blank();
    print(`[OK] added: <span style="color:var(--green)">${name}</span> <span class="line-dim">(${DIFF_LABELS[diff]||'easy'}, ${units} unit${units!==1?'s':''})</span>`,'line-ok');
    blank();
    COMMANDS.tasks();
  },

  async check(args){
    if(!session.user){print('not logged in','line-err');return;}
    const idx=parseInt(args[0])-1;
    const tasks=allData[session.user]?.tasks||[];
    if(isNaN(idx)||idx<0||idx>=tasks.length){print(`error: task #${args[0]} not found — use "tasks" to see your list`,'line-err');return;}
    if(tasks[idx].done){print(`task #${args[0]} is already done — use "uncheck ${args[0]}" to undo`,'line-dim');return;}
    tasks[idx].done=true;
    await usersCol.doc(session.user).set({tasks},({}),{merge:true});
    await usersCol.doc(session.user).set({tasks},{merge:true});
    const pts=taskPts(tasks[idx],true,tasks);
    blank();
    print(`[✓] <span style="color:var(--green)">${tasks[idx].name}</span> — earned <span style="color:var(--amber);font-weight:700">+${pts} pts</span>`,'line-ok');
    blank();
    COMMANDS.tasks();
  },

  async uncheck(args){
    if(!session.user){print('not logged in','line-err');return;}
    const idx=parseInt(args[0])-1;
    const tasks=allData[session.user]?.tasks||[];
    if(isNaN(idx)||idx<0||idx>=tasks.length){print(`error: task #${args[0]} not found`,'line-err');return;}
    if(!tasks[idx].done){print(`task #${args[0]} is not checked`,'line-dim');return;}
    tasks[idx].done=false;
    await usersCol.doc(session.user).set({tasks},{merge:true});
    blank();
    print(`[OK] unchecked: <span style="color:var(--amber)">${tasks[idx].name}</span>`,'line-ok');
    blank();
    COMMANDS.tasks();
  },

  async rm(args){
    if(!session.user){print('not logged in','line-err');return;}
    const idx=parseInt(args[0])-1;
    const tasks=allData[session.user]?.tasks||[];
    if(isNaN(idx)||idx<0||idx>=tasks.length){print(`error: task #${args[0]} not found`,'line-err');return;}
    const name=tasks[idx].name;
    tasks.splice(idx,1);
    await usersCol.doc(session.user).set({tasks},{merge:true});
    blank();
    print(`[OK] removed: ${name}`,'line-ok');
    blank();
    COMMANDS.tasks();
  },

  clear(){clearOut();}
};

function buildLbTable(entries,maxPts){
  if(!entries){
    entries=Object.entries(allData)
      .filter(([,d])=>d.passwordHash)
      .map(([n,d])=>({name:n,points:calcPoints(d.tasks),tasks:(d.tasks||[]).length,done:(d.tasks||[]).filter(t=>t.done).length}))
      .sort((a,b)=>b.points-a.points);
    maxPts=entries[0]?.points||1;
  }
  let t=`<table class="t-table"><thead><tr><th>rank</th><th>user</th><th>pts</th><th>done/total</th><th>progress</th></tr></thead><tbody>`;
  entries.forEach((e,i)=>{
    const isMe=e.name===session.user;
    const pct=Math.round((e.points/(maxPts||1))*100);
    const rc=i<3?` r${i+1}`:'';
    t+=`<tr class="${isMe?'me':''}">
      <td><span class="rb${rc}">${i<3?['#1','#2','#3'][i]:`#${i+1}`}</span></td>
      <td><span style="color:${isMe?'var(--green)':'var(--text)'};font-weight:${isMe?700:400}">${e.name}${isMe?' ◆':''}</span></td>
      <td><span style="color:var(--green);font-weight:700">${e.points.toLocaleString()}</span></td>
      <td class="line-dim">${e.done}/${e.tasks}</td>
      <td>${progBar(pct)}</td>
    </tr>`;
  });
  t+=`</tbody></table>`;
  return t;
}

// ── Input handler ─────────────────────────────────────────────────────────
async function runCmd(raw){
  const input=raw.trim();
  printCmd(input);
  if(!input)return;

  if(session.mode==='password'){
    if(passwordCallback){const cb=passwordCallback;passwordCallback=null;await cb(input);}
    return;
  }

  if(input){cmdHistory.unshift(input);if(cmdHistory.length>50)cmdHistory.pop();}
  histIdx=-1;draftCmd='';

  const [cmd,...args]=input.split(/\s+/);
  const fn=COMMANDS[cmd.toLowerCase()];
  if(fn)await fn(args);
  else{
    print(`bash: ${cmd}: command not found — type "help" for available commands`,'line-err');
    blank();
  }
}

const inp=document.getElementById('cmdInput');
inp.addEventListener('keydown',async e=>{
  if(e.key==='Enter'){
    e.preventDefault();
    const val=inp.value;
    inp.value='';
    await runCmd(val);
  }
  else if(e.key==='ArrowUp'&&session.mode==='cmd'){
    e.preventDefault();
    if(histIdx===-1)draftCmd=inp.value;
    if(histIdx<cmdHistory.length-1){histIdx++;inp.value=cmdHistory[histIdx];}
    inp.setSelectionRange(inp.value.length,inp.value.length);
  }
  else if(e.key==='ArrowDown'&&session.mode==='cmd'){
    e.preventDefault();
    if(histIdx>0){histIdx--;inp.value=cmdHistory[histIdx];}
    else if(histIdx===0){histIdx=-1;inp.value=draftCmd;}
    inp.setSelectionRange(inp.value.length,inp.value.length);
  }
  else if(e.key==='l'&&e.ctrlKey){e.preventDefault();COMMANDS.clear();}
  else if(e.key==='c'&&e.ctrlKey&&session.mode==='password'){
    e.preventDefault();exitPasswordMode();print('^C','line-dim');blank();
  }
});

// keep input focused
document.addEventListener('click',()=>inp.focus());
inp.focus();

// ── Boot ──────────────────────────────────────────────────────────────────
async function boot(){
  // load all users first
  try{
    const snap=await usersCol.get();
    snap.forEach(doc=>{allData[doc.id]=doc.data();});
  }catch(e){
    print('error: could not connect to firebase — check your Firestore rules','line-err');
    print(e.message,'line-dim');
    blank();
  }
  startLive();

  print('<span style="color:var(--green)"> __    __ ___  ____  __ __ ____  ____  _____</span>');
  print('<span style="color:var(--green)"> \\ \\  / // _ \\|  _ \\|  |/ /|  _ \\|_  _|/ ___/</span>');
  print('<span style="color:var(--green)">  \\ \\/ /| | | | |_) |     / | |_) | | | \\___ \\</span>');
  print('<span style="color:var(--green)">   \\  / | |_| |  _ &lt;| |\\ \\ |  __/  | |  ___) |</span>');
  print('<span style="color:var(--green)">    \\/   \\___/|_| \\_|_| \\_||_|    |___||____/ </span>');
  blank();
  print('work points tracker — firebase edition','line-dim');
  print(`<span class="line-dim">${Object.keys(allData).filter(k=>allData[k].passwordHash).length} registered user(s) | ${new Date().toLocaleString()}</span>`);
  blank();
  print('type <span style="color:var(--green)">help</span> for available commands');
  print('type <span style="color:var(--green)">register &lt;name&gt;</span> to create an account or <span style="color:var(--green)">login &lt;name&gt;</span> to sign in');
  blank();
}

boot();
